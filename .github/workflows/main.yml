name: Run Options Backtest
on: 
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows you to click "Run Workflow" manually in GitHub

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy pyyaml

      - name: Run backtester
        run: python backtester.py
        
